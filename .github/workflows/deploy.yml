name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "ERROR: YOUTUBE_API_KEY secret is not set" >&2
            exit 1
          fi
          sed -i "s|__YOUTUBE_API_KEY__|${YOUTUBE_API_KEY}|g" jujitsu_archive.html
          grep -q "AIza" jujitsu_archive.html && echo "Injection OK" || { echo "ERROR: Injection failed" >&2; exit 1; }

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
